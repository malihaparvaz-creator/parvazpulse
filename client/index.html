<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Parvaz Pulse</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#a78bfa" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Parvaz Pulse" />
    <link rel="apple-touch-icon" href="/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png" />

    <!-- Android / General -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Parvaz Pulse" />
    <meta name="description" content="Your mindful focus companion" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#a78bfa" />
    <meta name="msapplication-TileImage" content="/icon-192x192.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />

    <style>
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[Parvaz] SW registered:', reg.scope))
            .catch(err => console.warn('[Parvaz] SW failed:', err));
        });
      }
    </script>
  </body>
</html>
